<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALPR - Reconhecimento de Placas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  h1 {
    font-size: 1.5rem; font-weight: 700; margin-bottom: 24px;
    display: flex; align-items: center; gap: 8px;
  }
  h1 small { font-size: 0.875rem; font-weight: 400; color: #94a3b8; }

  .permission-prompt {
    text-align: center; padding: 48px 16px; color: #94a3b8;
  }
  .permission-prompt .icon { font-size: 3rem; margin-bottom: 16px; }
  .permission-prompt p { margin-bottom: 16px; }
  .btn {
    background: #22c55e; color: #fff; border: none; border-radius: 8px;
    padding: 10px 24px; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: #16a34a; }
  .btn.danger { background: #ef4444; }
  .btn.danger:hover { background: #dc2626; }

  .camera-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .camera-card {
    background: #1e293b; border: 2px solid transparent; border-radius: 12px;
    padding: 14px; cursor: pointer; transition: all 0.2s;
  }
  .camera-card:hover { border-color: #475569; }
  .camera-card.selected { border-color: #22c55e; background: #052e16; }
  .camera-card .name { font-weight: 600; font-size: 0.95rem; }
  .camera-card .info { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }

  .viewer { display: none; margin-top: 8px; }
  .viewer.active { display: block; }
  .viewer .stream-wrapper {
    position: relative; background: #000; border-radius: 12px; overflow: hidden;
    aspect-ratio: 16 / 9; max-height: 70vh;
  }
  .viewer video {
    display: block; width: 100%; height: 100%;
    object-fit: contain; object-position: center;
    border-radius: 12px 12px 0 0;
  }
  .viewer .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: #1e293b; border-radius: 0 0 12px 12px;
  }
  .viewer .bar .cam-label { font-weight: 600; font-size: 0.9rem; }
  .viewer .bar .status { font-size: 0.8rem; color: #94a3b8; }

  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 3px solid #334155; border-top-color: #22c55e;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 24px; color: #94a3b8; }
  .empty { text-align: center; padding: 32px; color: #94a3b8; }
  .error { text-align: center; padding: 32px; color: #f87171; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <nav style="display:flex;gap:4px;margin-bottom:24px;background:#1e293b;border-radius:10px;padding:4px">
    <a href="/" style="padding:8px 18px;border-radius:8px;text-decoration:none;color:#e2e8f0;font-size:0.9rem;font-weight:500;background:#22c55e">Monitor</a>
    <a href="/admin/cameras" style="padding:8px 18px;border-radius:8px;text-decoration:none;color:#94a3b8;font-size:0.9rem;font-weight:500;transition:all 0.2s">Câmeras</a>
    <a href="/admin/config" style="padding:8px 18px;border-radius:8px;text-decoration:none;color:#94a3b8;font-size:0.9rem;font-weight:500;transition:all 0.2s">Config</a>
  </nav>

  <h1><span>ALPR</span><small>Reconhecimento de Placas</small></h1>

  <div id="step-permission" class="permission-prompt">
    <div class="icon">📷</div>
    <p>Este aplicativo precisa acessar sua câmera para reconhecer placas de veículos.</p>
    <button class="btn" onclick="requestCamera()">Permitir Acesso à Câmera</button>
  </div>

  <div id="step-cameras" class="hidden">
    <p style="margin-bottom:12px;color:#94a3b8;font-size:0.9rem">
      Selecione uma câmera:
    </p>
    <div id="camera-list" class="camera-grid"></div>
  </div>

  <div id="step-viewer" class="viewer">
    <div class="stream-wrapper">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="bar">
      <span class="cam-label" id="cam-label"></span>
      <span class="status" id="cam-status">Aguardando...</span>
      <button class="btn danger" onclick="stopCamera()">Parar</button>
    </div>
  </div>
</div>

<script>
let mediaStream = null;
let selectedDeviceId = null;
let processingTimer = null;
const _captureCanvas = document.createElement('canvas');
const _captureCtx = _captureCanvas.getContext('2d');

async function requestCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    stream.getTracks().forEach(t => t.stop());
    document.getElementById('step-permission').classList.add('hidden');
    document.getElementById('step-cameras').classList.remove('hidden');
    await listCameras();
  } catch (err) {
    document.getElementById('step-permission').innerHTML = `
      <div class="error">
        <p>Erro ao acessar câmera: ${err.message}</p>
        <button class="btn" onclick="requestCamera()" style="margin-top:12px">Tentar Novamente</button>
      </div>`;
  }
}

async function listCameras() {
  const container = document.getElementById('camera-list');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Listando câmeras...</div>';

  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');

    if (videoDevices.length === 0) {
      container.innerHTML = '<div class="empty">Nenhuma câmera encontrada.</div>';
      return;
    }

    container.innerHTML = '';
    videoDevices.forEach((dev, idx) => {
      const label = dev.label || `Câmera ${idx + 1}`;
      const card = document.createElement('div');
      card.className = 'camera-card';
      card.innerHTML = `
        <div class="name">${label}</div>
        <div class="info">${dev.deviceId ? deviceIdShort(dev.deviceId) : 'ID indisponível'}</div>
      `;
      card.addEventListener('click', () => startCamera(dev.deviceId, label));
      container.appendChild(card);
    });
  } catch (err) {
    container.innerHTML = `<div class="error">Erro ao listar câmeras: ${err.message}</div>`;
  }
}

function deviceIdShort(id) {
  return id.length > 20 ? id.slice(0, 16) + '…' : id;
}

async function startCamera(deviceId, label) {
  if (mediaStream) stopCamera();
  selectedDeviceId = deviceId;

  document.querySelectorAll('.camera-card').forEach(c => c.classList.remove('selected'));
  const cards = document.getElementById('camera-list').children;
  for (const card of cards) {
    const name = card.querySelector('.name');
    if (name && name.textContent === label) {
      card.classList.add('selected');
      break;
    }
  }

  try {
    const constraints = {
      video: deviceId ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } } : true,
      audio: false,
    };

    mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = mediaStream;

    document.getElementById('step-cameras').classList.add('hidden');
    document.getElementById('step-viewer').classList.add('active');
    document.getElementById('cam-label').textContent = label;

    video.onloadedmetadata = () => {
      _captureCanvas.width = video.videoWidth;
      _captureCanvas.height = video.videoHeight;
      startProcessing(label);
    };
  } catch (err) {
    document.getElementById('cam-status').textContent = `Erro: ${err.message}`;
  }
}

function startProcessing(camName) {
  const video = document.getElementById('video');
  const status = document.getElementById('cam-status');

  const INTERVAL_MS = 500;

  async function captureAndDetect() {
    if (!mediaStream) return;

    _captureCanvas.width = video.videoWidth;
    _captureCanvas.height = video.videoHeight;
    _captureCtx.drawImage(video, 0, 0);

    _captureCanvas.toBlob(async (blob) => {
      try {
        const res = await fetch('/detect', {
          method: 'POST',
          headers: {
            'X-Camera-Id': selectedDeviceId || '0',
            'X-Camera-Name': encodeURIComponent(camName),
          },
          body: blob,
        });

        if (!res.ok) {
          status.textContent = 'Erro no servidor';
          return;
        }

        const detections = await res.json();
        status.textContent = detections.length > 0
          ? `${detections.length} placa(s) detectada(s)`
          : 'Monitorando...';
      } catch (err) {
        status.textContent = 'Erro de conexão';
      }
    }, 'image/jpeg', 0.7);
  }

  if (processingTimer) clearInterval(processingTimer);
  processingTimer = setInterval(captureAndDetect, INTERVAL_MS);
}

function stopCamera() {
  if (processingTimer) {
    clearInterval(processingTimer);
    processingTimer = null;
  }

  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  const video = document.getElementById('video');
  video.srcObject = null;

  document.getElementById('step-viewer').classList.remove('active');
  document.getElementById('step-cameras').classList.remove('hidden');
  document.getElementById('cam-status').textContent = 'Aguardando...';
}
</script>
</body>
</html>
